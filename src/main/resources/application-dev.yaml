spring:

  config:
    import: optional:file:.env[.properties]

  docker:
    compose:
      enabled: false

  jwt:
    secret: ${JWT_SECRET}
  datasource:

    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: true

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.springframework: INFO

server:
  port: 8080